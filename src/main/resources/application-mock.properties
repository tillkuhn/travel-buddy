# Committed, non-sensitive config for scenario 2: local mocks (see mocks/README.md).
# Activated via Spring profile "mock" (make run-mock, or:
# mvn spring-boot:run -Dspring-boot.run.profiles=mock).
# Requires: make mocks-start (or manually run mocks/mock_oidc.py + mocks/mock_gateway.py).
gateway.auth.token-url=http://localhost:9200/realms/mock/protocol/openid-connect/token
gateway.auth.client-id=mock-client
gateway.auth.client-secret=mock-secret
gateway.auth.scope=mock-scope

embabel.agent.platform.models.openai.base-url=http://localhost:9300/mock-model
embabel.agent.platform.models.openai.api-key=unused

embabel.models.default-llm=mock-model
