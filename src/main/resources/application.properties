# --- LLM endpoint (OpenAI wire protocol) ---
# Default: a local, unauthenticated ramalama server. To target a remote, token-authenticated
# AI gateway instead, copy application-remote.properties.example -> application-remote.properties
# (gitignored) and set the gateway URL + credentials there; those values override the ones below.
embabel.agent.platform.models.openai.base-url=http://localhost:11434
embabel.agent.platform.models.openai.api-key=unused
# CAUTION: default-llm values needs to be a registered OpenAI model; use well-known options like gpt-* or add
# custom entries to src/main/resources/models/openai-models.yml  if ramalama serves a different model that's OK
embabel.models.default-llm=gpt-4.1-mini
#embabel.models.default-llm=library/llama3.2
#embabel.models.default-llm=TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF

# Load local, gitignored overrides (remote gateway URL + Keycloak credentials) if present.
# The file is always imported if it exists, but its properties only take effect when the "remote"
# profile is active (see spring.config.activate.on-profile inside it) - so 'make run' (no profile)
# is unaffected by its presence, while 'make run-remote' (-Dspring-boot.run.profiles=remote)
# picks it up.
spring.config.import=optional:file:./application-remote.properties

# --- Retry/timeout tuning ---
# Embabel's default retry policy for OpenAI-compatible model calls is 10 attempts with exponential
# backoff up to 180s per attempt - worst case ~20+ minutes before giving up, during which the UI
# just hangs with no feedback. Bound this to a much shorter, user-tolerable window. Note this also
# retries permanent failures (e.g. DNS/connection errors to an unreachable gateway) since Embabel's
# SpringAiRetryPolicy treats unknown exceptions as retryable by default.
embabel.agent.platform.models.openai.max-attempts=3
embabel.agent.platform.models.openai.backoff-millis=2000
embabel.agent.platform.models.openai.backoff-multiplier=3.0
embabel.agent.platform.models.openai.backoff-max-interval=15000

# Other available personalities: severance, colossus, hitchhiker, montypython.
# embabel.agent.logging.personality=starwars
spring.application.name=Travel Planner
logging.level.net.timafe.travel=DEBUG
logging.level.net.timafe.travel.gateway=DEBUG
# OAuth2 client debug logging - shows token acquisition and refresh
logging.level.org.springframework.security.oauth2.client=DEBUG
# HTTP client debug logging - shows actual requests/responses
logging.level.org.springframework.web.client.RestClient=DEBUG
logging.level.org.springframework.http.client=DEBUG
