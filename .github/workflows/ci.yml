name: CI

on:
  push:
    branches: [main]
    paths:
      - 'pom.xml'
      - 'src/**'
  pull_request:
    branches: [main]
    paths:
      - 'pom.xml'
      - 'src/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn --show-version --no-transfer-progress --batch-mode verify
